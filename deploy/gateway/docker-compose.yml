services:
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy-gateway
    restart: always
    env_file:
      - .env
    ports:
      - "${APP_HTTP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config
