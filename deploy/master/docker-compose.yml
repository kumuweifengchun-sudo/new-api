services:
  app:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: new-api:local
    container_name: new-api-master
    restart: always
    env_file:
      - .env
    command: --log-dir /app/logs
    volumes:
      - ../../data/master:/data
      - ../../logs/master:/app/logs
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1:3000/api/status | grep -o '\"success\":\\s*true' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2.8-alpine
    container_name: caddy-master
    restart: always
    env_file:
      - .env
    depends_on:
      - app
    ports:
      - "${APP_HTTP_PORT:-80}:80"
      - "${APP_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./caddy_data:/data
      - ./caddy_config:/config

